version: '3'

vars:
  NLUA: ~/.luarocks/bin/nlua

tasks:
  test:
    desc: Run the full test suite
    cmds:
      - |
        eval "$(luarocks --lua-version 5.1 path)" && \
        busted --lua {{.NLUA}} spec/

  test-file:
    desc: "Run a single spec file. Usage: task test-file -- spec/url_spec.lua"
    cmds:
      - |
        eval "$(luarocks --lua-version 5.1 path)" && \
        busted --lua {{.NLUA}} {{.CLI_ARGS}}
